moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    type: follow_joint_trajectory
    action_ns: follow_joint_trajectory
    default: True
    joints:
      - arm_0_joint
      - arm_1_joint
      - arm_2_joint

  gripper_controller:
    type: follow_joint_trajectory
    action_ns: follow_joint_trajectory
    default: True
    joints:
      - gripper_left_joint
      - gripper_right_joint
